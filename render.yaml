services:
  - type: web
    name: clipforge-backend
    runtime: docker
    plan: starter
    branch: main
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: STORAGE_TYPE
        value: r2
      - key: MAX_FILE_SIZE_MB
        value: "500"
      - key: FILE_TTL_HOURS
        value: "24"
      - key: MAX_SHORTS
        value: "3"
      - key: R2_BUCKET
        value: video-pipeline
      - key: R2_PUBLIC_URL
        value: https://pub-xxx.r2.dev
      - key: SHOTSTACK_ENV
        value: stage
      - key: DATABASE_URL
        fromDatabase:
          name: clipforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: clipforge-redis
          type: keyvalue
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: SHOTSTACK_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

  - type: worker
    name: clipforge-worker
    runtime: docker
    plan: starter
    branch: main
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: STORAGE_TYPE
        value: r2
      - key: MAX_FILE_SIZE_MB
        value: "500"
      - key: FILE_TTL_HOURS
        value: "24"
      - key: MAX_SHORTS
        value: "3"
      - key: R2_BUCKET
        value: video-pipeline
      - key: R2_PUBLIC_URL
        value: https://pub-xxx.r2.dev
      - key: SHOTSTACK_ENV
        value: stage
      - key: DATABASE_URL
        fromDatabase:
          name: clipforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: clipforge-redis
          type: keyvalue
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: SHOTSTACK_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: clipforge-frontend
    runtime: docker
    plan: starter
    branch: main
    dockerContext: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://clipforge-backend.onrender.com/api

type: keyvalue
    name: clipforge-redis
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: public access from anywhere

databases:
  - name: clipforge-db
    plan: starter
    postgresMajorVersion: "18"
    databaseName: vidpipeline
